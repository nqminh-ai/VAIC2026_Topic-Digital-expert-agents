services:
  credit-risk-model:
    profiles: ["ml"]
    build:
      context: ./ml-credit-service
    ports:
      - "8000:8000"
    environment:
      - CREDIT_MODEL_DIR=/models/champion
    volumes:
      - ./ml-credit-service/artifacts/champion:/models/champion:ro
    networks:
      - vaic-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: vaic_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/vaic_neo_pass
      - NEO4J_dbms_memory_heap_initial__size=256m
      - NEO4J_dbms_memory_heap_max__size=512m
      - NEO4J_dbms_memory_pagecache_size=256m
    volumes:
      - neo4jdata:/data
    networks:
      - vaic-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  backend:
    build:
      context: ./backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - path: .env
        required: false
    environment:
      - NODE_ENV=development
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - vaic-network

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - path: .env
        required: false
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - backend
    networks:
      - vaic-network

networks:
  vaic-network:
    driver: bridge

volumes:
  neo4jdata:
